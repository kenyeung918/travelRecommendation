<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBloom | Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="travel_recommendation.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-container">
                <div class="logo">
                    <i class="fas fa-plane"></i>
                    <span>TravelBloom</span>
                </div>
                
                <ul class="nav-links">
                    <li><a href="travel_recommendation.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="about_us.html" class="nav-link"><i class="fas fa-info-circle"></i> About Us</a></li>
                    <li><a href="contact_us.html" class="nav-link active"><i class="fas fa-envelope"></i> Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="contact-content">
        <div class="container">
            <h1 class="contact-title">CONTACT US</h1>
            <p class="contact-subtitle">Get in touch</p>
            
            <div class="contact-form-container">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Submit</button>
                </form>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="travel_recommendation.js"></script>
</body>
</html>
