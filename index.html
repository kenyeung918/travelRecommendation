<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=travel_recommendation.html">
    <title>TravelBloom - Redirecting...</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4ecdc4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>TravelBloom</h1>
    <p>Redirecting to Travel Recommendation Website...</p>
    <div class="loader"></div>
    <p>If you are not redirected automatically, <a href="travel_recommendation.html">click here</a>.</p>
    
    <script>
        // Alternative redirect in case meta refresh doesn't work
        setTimeout(function() {
            window.location.href = "travel_recommendation.html";
        }, 2000);
    </script>
</body>
</html>
